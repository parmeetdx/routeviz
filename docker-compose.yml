services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ops_ledger
      POSTGRES_USER: ops_ledger
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ops_ledger"]
      interval: 5s
      timeout: 5s
      retries: 10

  ops-ledger:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://ops_ledger:${POSTGRES_PASSWORD:-changeme}@postgres:5432/ops_ledger
      NODE_ENV: production
    volumes:
      # Docker socket for container scanning
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # NPM SQLite database (adjust path to match your setup)
      - /docker/apps/nginx-proxy-manager/data:/npm-data:ro
      # Preserve store.json for one-time migration on first boot
      - ops_ledger_data:/app/.ops-ledger
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  ops_ledger_data:
