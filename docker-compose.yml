services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: routeviz
      POSTGRES_USER: routeviz
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U routeviz"]
      interval: 5s
      timeout: 5s
      retries: 10

  routeviz:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-8141}:3000"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      DATABASE_URL: postgresql://routeviz:${POSTGRES_PASSWORD:-changeme}@postgres:5432/routeviz
      NODE_ENV: production
      HOST_ADDRESS: ${HOST_ADDRESS:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # NPM SQLite mode only: set NPM_DATA_PATH in .env to your NPM data directory.
      # API mode users can leave this unset — the mount is ignored.
      - ${NPM_DATA_PATH:-/tmp}:/npm-data:ro
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      DATABASE_URL: postgresql://routeviz:${POSTGRES_PASSWORD:-changeme}@postgres:5432/routeviz
      NODE_ENV: production
      HOST_ADDRESS: ${HOST_ADDRESS:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # NPM SQLite mode only: set NPM_DATA_PATH in .env to your NPM data directory.
      # API mode users can leave this unset — the mount is ignored.
      - ${NPM_DATA_PATH:-/tmp}:/npm-data:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
