name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to Setup
        2. Click ...
        3. See error
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Routeviz version / commit
      placeholder: e.g. main@abc1234

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - Host OS: Ubuntu 24.04
        - Docker: 26.1
        - Reverse proxy: NPM 2.12 (API mode)

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
